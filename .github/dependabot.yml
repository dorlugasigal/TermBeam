# Dependabot is configured to group all updates within each ecosystem
# into a single PR. Note: Dependabot cannot group across ecosystems
# (npm / github-actions / docker each produce their own PR). For an
# all-in-one PR, see `.github/workflows/combine-prs.yml`, which runs
# monthly (and on demand) and stitches every open Dependabot PR into
# a single consolidated PR.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps):'
    groups:
      all-npm:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'chore(ci):'
    groups:
      all-actions:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps):'
    groups:
      all-docker:
        patterns:
          - '*'
