name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: pip install mkdocs-material
      - run: npm ci
      - run: npm run test:coverage
      - run: mkdocs build --strict
      - run: cp -r coverage site/coverage
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
