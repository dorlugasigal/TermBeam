name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'packages/site/**'
      - '.github/workflows/site.yml'
  pull_request:
    paths:
      - 'packages/site/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: github-pages
            deploy_target: ''
            site_url: ''
          - name: cloudflare
            deploy_target: cloudflare
            site_url: https://termbeam.pages.dev
    defaults:
      run:
        working-directory: packages/site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/site/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build with Astro
        env:
          DEPLOY_TARGET: ${{ matrix.target.deploy_target }}
          SITE_URL: ${{ matrix.target.site_url }}
        run: npm run build
      - name: Upload Pages artifact
        if: matrix.target.name == 'github-pages'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/site/dist
      - name: Upload Cloudflare artifact
        if: matrix.target.name == 'cloudflare'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudflare-dist
          path: packages/site/dist

  deploy-github-pages:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  deploy-cloudflare-pages:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: cloudflare-pages
      url: https://termbeam.pages.dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: packages/site
      - name: Download Cloudflare build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudflare-dist
          path: packages/site/dist
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/site
          command: pages deploy dist --project-name=termbeam --branch=main
