name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'packages/site/**'
      - '.github/workflows/site.yml'
  pull_request:
    paths:
      - 'packages/site/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-github-pages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/site/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build with Astro (GitHub Pages target)
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: packages/site/dist

  deploy-github-pages:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-github-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  deploy-cloudflare-pages:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: cloudflare-pages
      url: https://termbeam.pages.dev
    defaults:
      run:
        working-directory: packages/site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/site/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build with Astro (Cloudflare target)
        env:
          DEPLOY_TARGET: cloudflare
          SITE_URL: https://termbeam.pages.dev
        run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/site
          command: pages deploy dist --project-name=termbeam --branch=main
