name: Deploy to Cloudflare Pages

# Optional secondary deploy target alongside GitHub Pages.
# This workflow is a no-op until the repository owner sets the variable
#   vars.CLOUDFLARE_PAGES_PROJECT  (e.g. "termbeam")
# and the secrets
#   secrets.CLOUDFLARE_API_TOKEN   (token with "Cloudflare Pages: Edit" permission)
#   secrets.CLOUDFLARE_ACCOUNT_ID  (Cloudflare account ID)
# Optionally set
#   vars.CLOUDFLARE_SITE_URL       (canonical https URL, defaults to https://termbeam.dev)
#
# Setup steps:
#   1. Create a Cloudflare Pages project with "Direct upload" mode.
#   2. Generate an API token: Cloudflare dashboard → My Profile → API Tokens
#      → Create Token → "Edit Cloudflare Workers" template OR a custom token
#      with permissions: Account → Cloudflare Pages → Edit.
#   3. Repo Settings → Secrets and variables → Actions:
#        - Variables: CLOUDFLARE_PAGES_PROJECT, (optional) CLOUDFLARE_SITE_URL
#        - Secrets:   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   4. Push to main or trigger manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'packages/site/**'
      - '.github/workflows/cloudflare-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.CLOUDFLARE_PAGES_PROJECT != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/site/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build with Astro (Cloudflare target)
        env:
          DEPLOY_TARGET: cloudflare
          SITE_URL: ${{ vars.CLOUDFLARE_SITE_URL || 'https://termbeam.dev' }}
        run: npm run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/site
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ github.ref == 'refs/heads/main' && 'main' || github.head_ref }}
